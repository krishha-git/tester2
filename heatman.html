				<h2>Weakness: The Quick Boomerang (Quickman's weapon) is the most effective weapon, dealing massive damage.
Alternative Weapon: The Metal Blade itself is also very effective if you have already defeated him once.
Conveyor Belt Management: The battle takes place on a moving conveyor belt. Work with the movement to avoid being pushed into him.
Dodge Strategy: When he jumps, he usually throws 2-3 blades. Jump over the lower ones and let the highest one pass over your head.
Movement Control: Stay in the middle of the room. If you get too close, he will jump to the other side of the room, potentially passing through you and causing damage.
Easy Kill Method: If you stand at a medium distance and only shoot when he is on the ground, you can establish a rhythm to defeat him without taking damage.
Boss Room Hazards: The spikes on the ceiling can be dangerous, so avoid high jumps when he is not in that phase.
